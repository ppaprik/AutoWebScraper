# =============================================================================
# Alembic Configuration
# Run from: /WebScraper/backend/database/
# Command:  python -m alembic upgrade head
# =============================================================================

[alembic]
script_location = migrations
prepend_sys_path = /WebScraper

# The sqlalchemy.url is set dynamically in migrations/env.py
# so we leave it blank here.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
